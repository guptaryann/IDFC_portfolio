<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Aryan Gupta | Product Analytics</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Inter', -apple-system, sans-serif; line-height: 1.6; background: #0a0f1a; color: #e5e7eb; overflow-x: hidden; }
    a { text-decoration: none; color: inherit; }

    .hero-container {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 40px;
      position: relative;
      overflow: hidden;
      background: radial-gradient(ellipse at 60% 40%, rgba(99,102,241,0.12) 0%, transparent 60%),
                  radial-gradient(ellipse at 20% 70%, rgba(139,92,246,0.08) 0%, transparent 50%);
    }
    .hero-content { text-align: center; z-index: 2; position: relative; }
    .hero-label { font-size: 13px; text-transform: uppercase; letter-spacing: 3px; color: #6366f1; margin-bottom: 20px; }
    .hero-title {
      font-size: clamp(40px, 8vw, 72px);
      font-weight: 700;
      margin-bottom: 16px;
      background: linear-gradient(135deg, #fff 0%, #a5b4fc 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .hero-subtitle { font-size: 18px; color: #9ca3af; margin-bottom: 48px; }
    .hero-buttons { display: flex; gap: 16px; justify-content: center; flex-wrap: wrap; }

    .btn { display: inline-flex; align-items: center; gap: 8px; padding: 14px 28px; border-radius: 8px; font-size: 15px; font-weight: 500; transition: all 0.3s ease; cursor: pointer; border: none; font-family: inherit; }
    .btn-primary { background: #6366f1; color: white; }
    .btn-primary:hover { background: #4f46e5; transform: translateY(-2px); box-shadow: 0 8px 24px rgba(99,102,241,0.4); }
    .btn-secondary { background: transparent; color: white; border: 1px solid rgba(255,255,255,0.25); }
    .btn-secondary:hover { border-color: #6366f1; background: rgba(99,102,241,0.1); }

    .hero-decoration { position: absolute; width: 100%; height: 100%; pointer-events: none; top: 0; left: 0; }
    .floating-card {
      position: absolute;
      background: rgba(255,255,255,0.04);
      backdrop-filter: blur(12px);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 14px;
      padding: 18px 26px;
    }
    .floating-card .card-metric { display: block; font-size: 26px; font-weight: 700; color: #6366f1; }
    .floating-card .card-label { font-size: 12px; color: #9ca3af; }
    .card-1 { top: 20%; left: 8%; animation: float 7s ease-in-out infinite 0s; }
    .card-2 { top: 55%; right: 8%; animation: float 7s ease-in-out infinite 2.5s; }
    .card-3 { bottom: 18%; left: 14%; animation: float 7s ease-in-out infinite 5s; }
    @keyframes float { 0%, 100% { transform: translateY(0px); } 50% { transform: translateY(-18px); } }

    .hero-grid {
      position: absolute;
      inset: 0;
      background-image: linear-gradient(rgba(99,102,241,0.04) 1px, transparent 1px), linear-gradient(90deg, rgba(99,102,241,0.04) 1px, transparent 1px);
      background-size: 60px 60px;
      z-index: 0;
    }

    @media (max-width: 768px) {
      .floating-card { display: none; }
      .hero-buttons { flex-direction: column; align-items: center; }
    }
  </style>
</head>
<body>
  <div class="hero-container">
    <div class="hero-grid"></div>
    <div class="hero-decoration">
      <div class="floating-card card-1">
        <span class="card-metric">68%</span>
        <span class="card-label">Drop-off Identified</span>
      </div>
      <div class="floating-card card-2">
        <span class="card-metric">₹15Cr</span>
        <span class="card-label">Revenue Impact</span>
      </div>
      <div class="floating-card card-3">
        <span class="card-metric">+23%</span>
        <span class="card-label">Conversion Lift</span>
      </div>
    </div>
    <div class="hero-content">
      <p class="hero-label">Product Analytics Portfolio</p>
      <h1 class="hero-title">Aryan Gupta</h1>
      <p class="hero-subtitle">Product Analytics · User Journey Optimization · Data-Driven Growth</p>
      <div class="hero-buttons">
        <a href="https://www.linkedin.com/company/funnelark/" target="_blank" class="btn btn-primary">
          <span>FunnelArk Work</span>
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M7 17L17 7M17 7H7M17 7V17"/></svg>
        </a>
        <a href="case-study.html" class="btn btn-secondary">
          <span>IDFC Case Study</span>
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
        </a>
      </div>
    </div>
  </div>
</body>
</html>
